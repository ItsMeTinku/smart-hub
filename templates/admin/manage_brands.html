{% extends "admin_base.html" %}
{% block content %}
<div class="admin-panel-section">
    <h2>Manage Brands</h2>
    <form method="POST" enctype="multipart/form-data" class="admin-form" style="max-width: 500px; margin-bottom: 30px;">
        <div class="form-group">
            <label>Brand Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Brand Logo/Image</label>
            <input type="file" name="image" accept="image/*">
        </div>
        <button type="submit" class="btn-admin">Add Brand</button>
    </form>

    <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for brand in brands %}
            <tr>
                <td>{{ brand.id }}</td>
                <td>
                    {% if brand.image_url %}
                    <img src="{{ url_for('static', filename='images/brands/' + brand.image_url) }}" width="50" alt="{{ brand.name }}">
                    {% else %}
                    No Image
                    {% endif %}
                </td>
                <td>{{ brand.name }}</td>
                <td class="action-links">
                    <a href="{{ url_for('delete_brand', id=brand.id) }}" class="delete" onclick="return confirm('Are you sure you want to delete this brand?');">Delete</a>
                </td>
            </tr>
            {% endfor %}
            {% if not brands %}
            <tr>
                <td colspan="4">No brands added yet.</td>
            </tr>
            {% endif %}
        </tbody>
    </table>
</div>
{% endblock %}
